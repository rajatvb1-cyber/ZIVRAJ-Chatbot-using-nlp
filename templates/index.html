<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo-section">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="ZIVRAJ Logo" class="logo-img-login">
                <h2>ZIVRAJ</h2>
                <p>Professional AI Assistant</p>
            </div>

            <div class="sidebar-menu">
                <button onclick="clearChat()">🗑 Clear Chat</button>
            </div>

            <div class="project-info">
                <h3>Project Info</h3>
                <p>Built with:</p>
                <ul>
                    <li>Python</li>
                    <li>Flask</li>
                    <li>HTML</li>
                    <li>CSS</li>
                    <li>JavaScript</li>
                </ul>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-container">

            <div class="chat-header">
                <h1>Professional Chatbot Application</h1>
                <p>Ask anything and get instant responses</p>
            </div>

            <div class="chat-box" id="chat-box">
                <div class="bot-message">
                    <div class="avatar">🤖</div>
                    <div class="message">
                        Hello 👋 I am <strong>SmartBot</strong>. How can I help you today?
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Send</button>
            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
